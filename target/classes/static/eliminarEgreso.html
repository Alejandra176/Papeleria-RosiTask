<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Egreso</title>
  <link rel="stylesheet" href="estilo-eliminarEgreso.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="modal">
    <div class="modal-header">
      <h2>Eliminar Egreso</h2>
    </div>
    <div class="modal-body">
      <p class="pregunta"><strong>¿Seguro que desea eliminar este egreso ?</strong></p>
      <p class="egreso-id"><strong>ID del egreso:</strong> <span id="egreso-id">001</span></p>
      <div class="botones">
        <button class="eliminar">Eliminar</button>
        <button type="button" class="cancelar"
					onclick="window.location.href='mostrarEgresos.html'">Cancelar</button>
			</div>
    </div>
  </div>
</body>
</html>
