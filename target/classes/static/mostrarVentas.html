<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="es" lang="es">
<head>
<meta http-equiv="Content-Type"
	content="application/xhtml+xml; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Módulo Ventas</title>

<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap"
	rel="stylesheet" />

<link rel="stylesheet"
	href="https://unpkg.com/primeicons@6.0.0/primeicons.css" />

<link rel="stylesheet" href="estilo-mostrarVentas.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
	<header class="header">
		<div class="logo">
			<img src="https://cdn-icons-png.flaticon.com/512/994/994649.png"
				alt="Icono de ventas" width="64" height="64" />
			<h1>Módulo Ventas</h1>
		</div>
		<div class="acciones-header">
			<i class="pi pi-bell" title="Notificaciones"></i> <i
				class="pi pi-times-circle" title="Cerrar"
				onclick="window.location.href='seleccionModulo.html'"></i>
		</div>
	</header>

	<main class="main">
		<section class="box">
			<h2>Lista de Ventas</h2>

			<div class="actions-container">
                <a href="registrarVenta.html" class="btn-registrar">Registrar venta</a>
				<button type="btn-productosMasVendidos"
					class="btn-productosMasVendidos"
					onclick="window.location.href='productosMasVendidos.html'">Productos
					mas vendidos</button>
			</div>



			<div class="barra-busqueda">
				<i class="pi pi-search"></i> <input type="text" id="buscar-id-venta" placeholder="Buscar por ID">
			</div>

			<table class="tabla-ventas">
				<thead>
					<tr>
						<th>ID</th>
						<th>FechaVenta</th>
						<th>TotalVenta</th>
						<th>FormaPago</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody id="tbody-ventas">
					
				</tbody>
			</table>
			<div class="pagination"></div>
			<div class="exportar">
  <div class="filtro-fechas">
    <label for="fechaInicio">Desde:</label>
    <input type="date" id="fechaInicio" />
    <label for="fechaFin">Hasta:</label>
    <input type="date" id="fechaFin" />
  </div>
  <div class="botones-exportar">
    <button class="btn-pdf" onclick="generarReportePDF()">Exportar a PDF</button>
    <button class="btn-excel" onclick="generarReporteExcel()">Exportar a Excel</button>
  </div>
</div>
		</section>
	</main>
</body>

<!-- Axios CDN -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!-- script para mostrar los productos -->
<script src="mostrarVentas.js"></script>

<div class="modal" id="modalEliminar" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Eliminar Venta</h2>
        </div>
        <div class="modal-body">
            <p class="pregunta"><strong>¿Seguro que desea eliminar este venta?</strong></p>
            <p class="nombre">ID de la venta: <strong id="idVentaEliminar"></strong></p>
            <div class="botones">
                <button class="cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
                <button class="eliminar">Eliminar</button>
            </div>
        </div>
    </div>
</div>
<!-- abrir y cerrar Eliminar -->
<script>
function abrirModalEliminar(id) {
    const modal = document.getElementById('modalEliminar');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
    document.getElementById('idVentaEliminar').textContent = id;
}

function cerrarModalEliminar() {
    const modal = document.getElementById('modalEliminar');
    modal.classList.remove('show');
    setTimeout(() => {
        modal.style.display = 'none';
    }, 300);
}

</script>
</html>
