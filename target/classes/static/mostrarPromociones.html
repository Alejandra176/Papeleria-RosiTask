<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulo Promociones</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- PrimeIcons -->
  <link rel="stylesheet" href="https://unpkg.com/primeicons@6.0.0/primeicons.css" />
  <!-- Estilos -->
  <link rel="stylesheet" href="estilo-mostrarProductos.css" />
  <!-- Estilo Validaciones -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <header class="header">
    <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3662/3662441.png" alt="icono" />
      <h1>Módulo Promociones</h1>
    </div>
    <div class="acciones-header">
        <i class="pi pi-bell" title="Notificaciones"></i> <i
				class="pi pi-times-circle" title="Cerrar"
				onclick="window.location.href='seleccionModulo.html'"></i>
      </div>
  </header>
  
  <main class="main">
    <section class="box">
      <h2>Listado de promociones</h2> 
      <a href="registrarPromocion.html">
				<button class="btn-registrar">Registrar promocion</button>
			</a>

			<div class="barra-busqueda">
  <i class="pi pi-search"></i>
  <input type="text" placeholder="Buscar por ID" id="buscar-id" />
</div>
     
      <table class="tabla-promociones">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo de promocion</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-promociones">
					<!-- Aquí se insertarán dinámicamente los descuentos -->
				</tbody>
			</table>
			
    <div class="pagination"></div>
		</section>
	</main>
	<!-- MODAL ELIMINAR Promociones -->
<div class="modal" id="modalEliminar" style="display: none;">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Eliminar Promociones</h2>
    </div>
    <div class="modal-body">
      <p class="pregunta"><strong>¿Seguro que desea eliminar esta promoción?</strong></p>
      <p class="nombre">ID de la promoción: <strong id="idPromocionEliminar"></strong></p>
      <div class="botones">
        <button class="cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
        <button class="eliminar">Eliminar</button>
            </div>
    </div>
  </div>
</div>
	 <!-- abrir y cerrar Eliminar -->
<script>
function abrirModalEliminar(id) {
    const modal = document.getElementById('modalEliminar');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
    document.getElementById('idPromocionEliminar').textContent = id;
}

function cerrarModalEliminar() {
    const modal = document.getElementById('modalEliminar');
    modal.classList.remove('show');
    setTimeout(() => {
        modal.style.display = 'none';
    }, 300);
}
</script>
	
</body>
<!-- Axios CDN -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!-- script para mostrar los promociones -->
<script src="mostrarPromociones.js"></script>
<script src="eliminarPromocion.js"></script>
</html>
