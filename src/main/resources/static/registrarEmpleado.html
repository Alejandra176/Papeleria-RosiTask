<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrar Empleado</title>
<link rel="stylesheet" href="estilo-registrarEmpleado.css" />
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
	<header class="header-registrar">
		<h1>Registrar Empleado</h1>
	</header>
	<main>
		<form id="formRegistrarEmpleado" class="formulario">
			<div class="campo">
				<label for="nombre">Nombre del Empleado</label> <input type="text"
					id="nombreEmpleado" placeholder="Ej: MarГӯa JosГ©" required
					pattern="^[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ\s]+$"
					title="El nombre no puede contener nГәmeros ni caracteres especiales">
			</div>

			<div class="campo">
				<label for="apellido">Apellido del Empleado</label> <input
					type="text" id="apellidoEmpleado" placeholder="Ej: GonzГЎlez LГіpez"
					required pattern="^[A-Za-zГҒГүГҚГ“ГҡГЎГ©ГӯГіГәГ‘Гұ\s]+$"
					title="El apellido no puede contener nГәmeros ni caracteres especiales">
			</div>

			<div class="campo">
				<label for="tipoDocumento">Tipo de Documento</label> <select
					id="tipoDocumento" required>
					<option value="" disabled selected>Seleccione un tipo</option>
					<option value="CC">CГ©dula de ciudadanГӯa</option>
					<option value="CE">CГ©dula de extranjerГӯa</option>
					<option value="PA">Pasaporte</option>
				</select>
			</div>

			<div class="campo">
				<label for="numeroDocumento">NГәmero de Documento</label> <input
					type="text" id="numeroDocumento" required>
			</div>

			<div class="campo">
				<label for="fechaNacimiento">Fecha de Nacimiento</label> <input
					type="date" id="fechaNacimiento" required>
			</div>

			<div class="campo">
				<label for="direccion">DirecciГіn Completa</label> <input type="text"
					id="direccion" required>
			</div>

			<div class="campo">
				<label for="telefono">TelГ©fono</label> <input type="text"
					id="telefono" placeholder=" eje: 3112341234" required>
			</div>

			<div class="campo">
				<label for="correo">Correo ElectrГіnico</label> <input type="email"
					id="correo" placeholder="ejemplo@empresa.com" required>
			</div>

			<div class="campo">
				<label for="cargo">Cargo</label> <select id="cargo" required>
					<option value="" disabled selected>Seleccione</option>
					<option value="Administrador">Administrador</option>
					<option value="Asistente">Asistente</option>
				</select>
			</div>


			<div class="campo">
				<label for="salario">Salario </label> <input type="number"
					id="salario" placeholder="$" min="0" required>
			</div>

			<div class="campo">
				<label for="fechaIngreso">Fecha de Ingreso</label> <input
					type="date" id="fechaIngreso" required>
			</div>

			<div class="campo">
				<label for="estado">Estado</label> <select id="estado" required>
					<option value="" disabled selected>Seleccione</option>
					<option value="activo">Activo</option>
					<option value="inactivo">Inactivo</option>
					<option value="prueba">Periodo de prueba</option>
					<option value="vacaciones">En vacaciones</option>
					<option value="licencia">Licencia mГ©dica</option>
				</select>
			</div>


			<div class="acciones">
				<button type="submit" class="registrar">Registrar</button>
				<button type="button" class="cancelar"
					onclick="window.location.href='mostrarNomina.html'">Cancelar</button>
			</div>
		</form>
	</main>
	<script src="registrarEmpleado.js"></script>
</body>
</html>
