<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Promocion</title>

</head>
<body>
  <div class="modal">
    <div class="modal-header">
      <h2>Eliminar Promocion</h2>
    </div>
    <div class="modal-body">
      <p class="pregunta"><strong>¿Seguro que desea eliminar esta promoción?</strong></p>
      <p class="nombre">ID de la promocion:<strong>5</strong></p>
      <div class="botones">
        <button class="cancelar" onclick="window.location.href='mostrarPromociones.html'">Cancelar</button>
        <button class="eliminar">Eliminar</button>
      </div>
    </div>
  </div>
</body>
</html>
