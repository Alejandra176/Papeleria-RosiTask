<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrar Usuario</title>
<link rel="stylesheet" href="estilo-registroUsuario.css" />
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>
	<div class="registro-container">
		<h1>Registrar Usuario</h1>
		<form id="formRegistrarUsuario" class="registro-form">
			<div class="campo">
				<label for="nombreEmpleado">Empleado</label> <select
					id="nombreEmpleado" name="nombreEmpleado" required style="color: black; background-color: white;">
					<option value="" disabled selected>Seleccione un empleado</option>
				</select>
			</div>

			<div class="campo">
				<label for="correo">Correo electrónico</label> <input type="text"
					id="correo" name="correo" required>
			</div>

			<div class="campo">
				<label for="contrasena">Contraseña</label> <input type="password"
					id="contrasena" name="contrasena" required>
			</div>

			<div class="campo">
				<label for="cargo">Rol</label> <select id="rol" required>
					<option value="" disabled selected>Seleccione</option>
					<option value="Administrador">Administrador</option>
					<option value="Asistente">Asistente</option>
				</select>
			</div>

			<div class="campo">
				<label for="estado">Estado</label> <select id="estado">
					<option selected>Activo</option>
					<option>Inactivo</option>
				</select>
			</div>

			<div class="campo">
				<label for="fechaIngreso">Fecha de Registro</label> <input
					type="date" id="fechaRegistro" required />
			</div>

			<div class="acciones">
				<button type="submit" class="registrar">Registrar</button>
				<button type="button" class="cancelar"
					onclick="window.location.href='mostrarUsuarios.html'">Cancelar</button>
			</div>

		</form>

	</div>
	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script src="registrarUsuario.js"></script>
</body>
</html>
