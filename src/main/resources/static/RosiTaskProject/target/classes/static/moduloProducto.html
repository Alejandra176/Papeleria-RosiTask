<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Módulo Producto</title>

<!-- Google Fonts: Inter -->
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
	rel="stylesheet" />

<!-- PrimeIcons -->
<link rel="stylesheet"
	href="https://unpkg.com/primeicons@6.0.0/primeicons.css" />

<!-- Estilos -->
<link rel="stylesheet" href="estilo-moduProductos.css" />
</head>
<body>
	<header class="header">
		<div class="logo">
			<img src="https://cdn-icons-png.flaticon.com/512/5311/5311136.png"
				alt="icono" />
			<h1>Módulo Producto</h1>
		</div>
		<div class="acciones-header">
			<i class="pi pi-bell" title="Notificaciones"></i> <i
				class="pi pi-arrow-left" title="Regresar"></i> <i
				class="pi pi-times-circle" title="Cerrar"></i>
		</div>
	</header>

	<main class="main">
		<section class="box">
			<h2>Lista de productos</h2>

			<a href="registrarProducto.html">
				<button class="btn-registrar">Registrar producto</button>
			</a>

			<div class="barra-busqueda">
				<i class="pi pi-search"></i> <input type="text" placeholder="Buscar" />
			</div>

			<table class="tabla-productos">
				<thead>
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Marca</th>
						<th>PrecioVenta</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>
				</thead>
				 <tbody id="tbody-productos">
                    <!-- Aquí se insertarán dinámicamente los productos -->
                </tbody>
			</table>

			<div class="exportar">
				<button class="btn-pdf">Exportar a PDF</button>
				<button class="btn-excel">Exportar a Excel</button>
			</div>
		</section>
	</main>
	
    
	
</body>

	 <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- script para mostrar los productos -->
    <script src="mostrarProductos.js"></script>
    <script src="eliminarProducto.js"></script>
</html>
