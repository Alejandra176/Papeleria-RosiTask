<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Papelería Rosita</title>
    <link rel="stylesheet" href="registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="registro-container">
        <h1>Registrar Usuario</h1>
        <form id="registroForm" class="registro-form">
            <label for="nombreUsuario">Nombre completo</label>
            <input type="text" id="nombreUsuario" name="nombreUsuario" required>

            <label for="correo">Correo electrónico o nombre de usuario</label>
            <input type="text" id="correo" name="correo" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" required>

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" name="confirmar" required>

            <label for="rol">Rol</label>
            <select id="rol" name="rol" required>
                <option value="">Seleccione un rol</option>
                <option value="administrador">Administrador</option>
                <option value="asistente">Asistente</option>
            </select>

            <button type="submit">Registrar</button>
        </form>
        <div id="mensajeError" style="color:red; margin-top: 10px;"></div>
        <div id="mensajeExito" style="color:green; margin-top: 10px;"></div>
        <a href="prueba.html" class="volver">← Volver al inicio de sesión</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="registroUsuario.js"></script>
</body>
</html>
