<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selección de Módulos</title>
<link rel="stylesheet"
	href="https://unpkg.com/primeicons/primeicons.css">
<link
	href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap"
	rel="stylesheet">
<link rel="stylesheet" href="estilo-selecModulos.css">
</head>
<body>
	<div class="contenedor">
		<h2>Seleccione el módulo de su interés</h2>
		<div class="grid-modulos">

			<a href="moduloProducto.html" class="modulo"
				style="text-decoration: none;"> <i class="pi pi-box"></i><span>Productos</span>
			</a>
			
			<a href="moduloNomina.html" class="modulo"
				style="text-decoration: none;"> <i class="pi pi-box"></i><span>Nomina</span>
			</a>
			


			<button class="modulo">
				<i class="pi pi-shopping-cart"></i><span>Ventas</span>
			</button>
			<button class="modulo">
				<i class="pi pi-send"></i><span>Pedidos</span>
			</button>
			<button class="modulo">
				<i class="pi pi-users"></i><span>Nómina</span>
			</button>
			
			<a href="mostrarProveedores.html" class="modulo"
			style="text-decoration: none;">
				<i class="pi pi-truck"></i><span>Proveedores</span>
			</a>
			
			<button class="modulo">
				<i class="pi pi-money-bill"></i><span>Egresos</span>
			</button>
			<button class="modulo">
				<i class="pi pi-tags"></i><span>Promociones</span>
			</button>
			<button class="modulo">
				<i class="pi pi-percentage"></i><span>Descuentos</span>
			</button>
			<button class="modulo">
				<i class="pi pi-wallet"></i><span>Caja</span>
			</button>
		</div>
	</div>
</body>
</html>
