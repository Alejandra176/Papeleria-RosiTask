<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Proveedor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #fdfdfd;
    }

    .header {
      background-color: #f7d9a8;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #3f1c5c;
    }

    .container {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      padding: 30px;
      background-color: white;
      justify-content: space-between;
    }

    .form-group {
      width: 45%;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 16px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[disabled] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      border-radius: 4px;
      color: #3f1c5c;
    }

    input[disabled] {
      background-color: #eee;
    }

    .buttons {
      display: flex;
      gap: 20px;
      padding: 0 30px 30px 30px;
    }

    .guardar {
      background-color: #c2f0c2;
      color: #3f1c5c;
      padding: 10px 20px;
      border: 2px solid #3f1c5c;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .cancelar {
      background-color: #fbb1d2;
      color: #3f1c5c;
      padding: 10px 20px;
      border: 2px solid #3f1c5c;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">Editar Proveedor</div>

  <form class="container">
    <div class="form-group">
      <label>ID Proveedor</label>
      <input type="text" value="2" disabled>
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="tel" value="3123431234">
    </div>

    <div class="form-group">
      <label>Nombre proveedor</label>
      <input type="text" value="Lina">
    </div>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" value="ejample@proveedor.co">
    </div>

    <div class="form-group">
      <label>Persona a cargo</label>
      <input type="text" value="Lina">
    </div>

    <div class="form-group">
      <label>Fecha de Ingreso</label>
      <input type="text" value="dd-mm-aaaa" disabled>
    </div>

    <div class="form-group">
      <label>Tipo Documento</label>
      <input type="text" value="Cédula">
    </div>

    <div class="form-group">
      <label>Observaciones</label>
      <input type="text" value="Proveedor Nuevo Pepe">
    </div>

    <div class="form-group">
      <label>Número Documento</label>
      <input type="text" value="10023454667">
    </div>

    <div class="form-group">
      <label>Ciudad</label>
      <input type="text" value="Bogotá">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" value="Calle 134 # 47 - 52">
    </div>
  </form>

  <div class="buttons">
    <button class="guardar">Guardar cambios</button>
    <button class="cancelar">Cancelar</button>
  </div>

</body>
</html>
