<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proveedores</title>
<style>
body {
	font-family: Arial, sans-serif;
	background-color: #f6f0fa;
	margin: 0;
	padding: 0;
}

header {
	background-color: #7b6592;
	color: white;
	padding: 20px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}

header .title {
	display: flex;
	align-items: center;
	gap: 10px;
}

header .icon {
	font-size: 30px;
}

.notification {
	font-size: 24px;
	color: yellow;
}

.container {
	padding: 30px;
}

h2 {
	background-color: #d8c8c8;
	padding: 10px;
	font-weight: bold;
	color: #3a2054;
}

.top-bar {
	display: flex;
	justify-content: space-between;
	margin: 15px 0;
}

.top-bar button {
	background-color: #b6f3b1;
	border: none;
	padding: 10px 15px;
	border-radius: 8px;
	font-weight: bold;
}

.search-box {
	display: flex;
	align-items: center;
	gap: 5px;
}

.search-box input {
	padding: 8px;
	border-radius: 8px;
	border: 2px solid #7b6592;
}

table {
	width: 100%;
	border-collapse: collapse;
	background-color: white;
}

th, td {
	padding: 12px;
	text-align: center;
}

th {
	background-color: #eceaec;
	color: #3a2054;
}

tr:nth-child(even) {
	background-color: #f3f3f3;
}

.actions button {
	margin: 0 5px;
	padding: 6px 12px;
	border: none;
	border-radius: 10px;
	font-weight: bold;
	cursor: pointer;
}

.edit-btn {
	background-color: #ffe7a6;
}

.details-btn {
	background-color: #d4f3f7;
}

.delete-btn {
	background-color: #f7b8b8;
}

.scrollbar {
	height: 10px;
	background-color: #ccc;
	margin-top: 5px;
	border-radius: 5px;
	overflow: hidden;
}

.scrollbar-thumb {
	height: 10px;
	width: 40%;
	background-color: #7b6592;
}
</style>
</head>
<body>
	<header>
		<div class="title">
			<span class="icon">👥</span>
			<h1>Proveedores</h1>
		</div>
		<div class="notification">🔔</div>
	</header>

	<div class="container">
		<h2>Listado de proveedores</h2>

		<div class="top-bar">
			<button>Agregar proveedor</button>


			<div class="search-box">
				🔍 <input type="text" placeholder="Buscar">
			</div>
		</div>

		<table>
			<thead>
				<tr>
					<th>Nombre</th>
					<th>Telefono</th>
					<th>Direccion</th>
					<th>Estado</th>
					<th>Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Jacobo</td>
					<td>3104567890</td>
					<td>Calle 123</td>
					<td>Activo</td>
					<td class="actions">
						<button class="edit-btn">Editar</button>
						<button class="details-btn">Detalles</button>
						<button class="delete-btn">Eliminar</button>
					</td>
				</tr>
				<!-- Aquí irían más filas dinámicamente -->
			</tbody>
		</table>

		<div class="scrollbar">
			<div class="scrollbar-thumb"></div>
		</div>
	</div>
</body>
</html>
