<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalles del Descuento</title>
  <link rel="stylesheet" href="estilo-registrarProducto.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <header class="header header detalles">
    <h1>Detalles del Descuento</h1>
  </header>
  
  <main class="contenedor-detalles">
  <div class="info-principal">
       <table class="tabla-detalles">
          <tr>
          <td class="etiqueta">ID Descuento:</td>
             <td id="detalle-idDescuento"></td>
          
          </tr>
          <tr>
          <td class="etiqueta">Nombre descuento:</td>
             <td id="detalle-nombreDescu"></td>
          </tr>
          
          <tr>
          <td class="etiqueta">Descripción:</td>
             <td id="detalle-descripcionDescu"></td>
          </tr>
          
          <tr>
          <td class="etiqueta">Tipo de Descuento:</td>
             <td id="detalle-tipoDescu"></td>
          </tr>
        
          <tr>
          <td class="etiqueta">Fecha inicio:</td>
             <td id="detalle-fechaInicio"></td>
          </tr>
        
          <tr>
          <td class="etiqueta">Fecha fin:</td>
             <td id="detalle-fechaFin"></td>
          </tr>
    
          <tr>
          <td class="etiqueta">Estado:</td>
             <td id="detalle-estadoDescu"></td>
          </tr>
      
          <tr>
          <td class="etiqueta">ID Producto:</td>
             <td id="detalle-idProducto"></td>
         </tr>
            </table>
        </div>
          
      <div class="boton-volver">
            <p style="margin-bottom: 30px; font-weight: bold; font-size: 18px;">
            </p>
            <button class="btn-volver" onclick="window.location.href='mostrarDescuentos.html'">Volver</button>
        </div>
    </main>
    
    <script src="detallesDescuentos.js"></script>
</body>
</html>
